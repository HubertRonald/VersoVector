[project]
name = "versovector"
language = "en"
task = "emotional_semantic_recommendation"
authors = [
    {name = "hubert ronald", email = "h.mendozac@uniandes.edu.co"}
]

[data]
processed_corpus = "data/poems_processed.csv"
reference_role = "reference"
external_role = "external"
id_column = "poem_id"
text_column = "poem_processed"

[features]
input_is_processed = true
to_dense = false
normalize = true

[supervised]
model_type = "stacking_classifier"
min_label_count = 10
threshold_strategy = "top_k"
top_k_tags = 5

[unsupervised]
n_topics = 7
reduction_components = 100
kmin = 2
kmax = 8
similarity_metric = "cosine"

[mlflow]
experiment_name = "versovector-emotional-semantic-recommender"
registered_model_name = "versovector-poem-analyzer"

[artifacts]
features_dir = "artifacts/features"
supervised_dir = "artifacts/supervised"
unsupervised_dir = "artifacts/unsupervised"
integration_dir = "artifacts/integration"
model_bundle_dir = "artifacts/model_bundle"