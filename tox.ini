[tox]
envlist = unit, integration, coverage, lint, build
isolated_build = true
skip_missing_interpreters = true

[testenv]
setenv =
    PYTHONPATH = {toxinidir}/src:{toxinidir}
    VERSOVECTOR_ALLOW_BLANK_SPACY = true
deps =
    -r requirements-test.txt
commands =
    pytest tests/

[testenv:unit]
description = Run unit tests.
commands =
    pytest tests/unit

[testenv:integration]
description = Run integration tests.
commands =
    pytest tests/integration

[testenv:coverage]
description = Run all tests with coverage.
commands =
    pytest --cov=src --cov=modules tests/

[testenv:lint]
description = Run lint checks.
deps =
    -r requirements-dev.txt
commands =
    flake8 src modules tests apps

[testenv:format]
description = Format code with black and isort.
deps =
    black==24.8.0
    isort==5.13.2
commands =
    black src modules tests apps
    isort src modules tests apps

[testenv:build]
description = Build wheel and source distribution.
deps =
    build>=1.2.0,<2.0.0
commands =
    python -m build